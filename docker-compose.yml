version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: eluno_db
    environment:
      POSTGRES_USER: eluno_admin
      POSTGRES_PASSWORD: eluno_password
      POSTGRES_DB: eluno_orders
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: eluno_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql+psycopg://eluno_admin:eluno_password@db:5432/eluno_orders
      - EMAIL_SENDER=${EMAIL_SENDER}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - EMAIL_RECEIVER=${EMAIL_RECEIVER}
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: eluno_frontend
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data: